name: Release Linux Build

on:
  workflow_dispatch: {}
  push:
    branches: [main]

# Incremental compilation here isn't helpful
env:
  CARGO_INCREMENTAL: 0

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: "ubuntu:25.04"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install GTK4 and libfuse2 (Linux)
        run: |
          apt-get update
          apt-get install -y curl wget git just meson ninja-build desktop-file-utils shared-mime-info gtk-update-icon-cache libglib2.0-bin libssl-dev file pkg-config libgtk-4-dev build-essential libfuse2 librsvg2-dev libadwaita-1-dev

      - name: Configure cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check GTK
        run: |
          echo "[GTK_VERSION]: $(pkg-config --modversion gtk4)"
          echo "[ADWAITA_VERSION]: $(pkg-config --modversion libadwaita-1)"
          echo "[PKG]: $(which pkg-config)"
          echo "[PKG_PATH]: $(pkg-config --variable pc_path pkg-config)"
          apt search libgtk-4-dev
          echo "$(lsb_release -dr)"

      # - name: Cargo build
      #   run: |
      #     cargo build --target $(rustup target list | awk '/installed/ {print $1;}') --release
      #
      # - name: Install cargo-deb (Linux)
      #   run: cargo install cargo-deb
      #
      # - name: Package (Linux, with modern)
      #   run: ./build-linux.sh

      - name: Meson build appimage
        run: just install-appimage

      - name: Meson build deb
        run: just install-deb

      - name: Upload AppImage to artifacts (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: openworship-x86_64-appimage
          path: builddir/openworship-*.AppImage
          if-no-files-found: error

      - name: Upload installer to artifacts (Linux)
        uses: actions/upload-artifact@v4
        with:
          path: builddir/openworship*.deb
          name: openworship-x86_64-deb
          if-no-files-found: error

      # create release with
      # https://github.com/softprops/action-gh-release
