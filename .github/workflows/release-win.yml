# This action enables building release executables/installers and can be triggered manually or by release creation.
#
# Executables are built both for releases and for manually triggered runs, uploaded to artifacts and assets.
name: Release Window Build

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
  # push:
  #   #   # tags:
  #   #   #   - "*"
  #   #   branches:
  #   #     - build/test
  #   pull_request:
  #   merge_group:

# Incremental compilation here isn't helpful
env:
  CARGO_INCREMENTAL: 0

jobs:
  release-win:
    # strategy:
    #   matrix:
    #     build:
    #       - os: windows-2022
    #         target: x86_64-pc-windows-msvc
    #         suffix: windows-x86_64-${{ github.sha}}
    #         rustflags: "-C target-cpu=x86-64-v2"
    runs-on: windows-2022
    permissions:
      contents: write # needed for uploading release artifact
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GTK4 cache
        uses: actions/cache@v5
        id: cache-gvsbuild-gtk
        with:
          path: C:\gtk-build\gtk\x64\release
          key: ${{ runner.os }}-gtk4

      # - name: Install Inno 6
      #   id: install_inno
      #   shell: pwsh
      #   run: |
      #     if (Test-Path "C:\Program Files (x86)\Inno Setup 6\") {
      #       echo "inno already installed"
      #     } else {
      #       winget install -e --id JRSoftware.InnoSetup -v 6.4.3 --accept-package-agreements `
      #         --accept-source-agreements --disable-interactivity --scope machine
      #       if (Test-Path "C:\Program Files (x86)\Inno Setup 6\") {
      #         echo "inno installed successfully"
      #       } else {
      #         throw "could not find inno's installation folder"
      #       }
      #     }

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # - name: Configure PATH
      #   run: echo "export PATH=$PATH:/c/Users/$USER/.cargo/bin:/c/Program\ Files\ \(x86\)/Inno\ Setup\ 6" > ~/.bashrc

      - name: Configure GTK4
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_ENV "PKG_CONFIG_PATH=C:\gtk-build\gtk\x64\release\lib\pkgconfig"
          Add-Content $env:GITHUB_ENV "PATH=C:\gtk-build\gtk\x64\release\bin;$env:PATH"
          Add-Content $env:GITHUB_ENV "LIB=C:\gtk-build\gtk\x64\release\lib;$env:LIB"
          Add-Content $env:GITHUB_ENV "INCLUDE=C:\gtk-build\gtk\x64\release\include;C:\gtk-build\gtk\x64\release\include\cairo;C:\gtk-build\gtk\x64\release\include\glib-2.0;C:\gtk-build\gtk\x64\release\include\gobject-introspection-1.0;C:\gtk-build\gtk\x64\release\lib\glib-2.0\include;$env:INCLUDE"

      - name: Install gvsbuild
        run: uv tool install gvsbuild

      - name: Install GTK4
        if: steps.cache-gvsbuild-gtk.outputs.cache-hit != 'true'
        run: uv run gvsbuild build gtk4 librsvg libadwaita adwaita-icon-theme

      - name: Verify Environment
        run: |
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          echo "LIB=$LIB"
          echo "INCLUDE=$INCLUDE"
          echo "PATH=$PATH"
          pkg-config --modversion gtk4
          pkg-config --modversion libadwaita-1

      - name: Configure cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: dtolnay/rust-toolchain@stable

      - name: Build app
        run: cargo build --locked --profile production

      - name: Copy DLL
        run: |
          mkdir -p bundle/bin
          mkdir -p bundle/share/glib-2.0/schemas
          mkdir -p bundle/share/icons
          mkdir -p bundle/lib/gdk-pixbuf-2.0

          GTK_DIR="C:/gtk-build/gtk/x64/release"

          cp target/production/openworship.exe      bundle/bin/
          cp res/windows/openworship.ico            bundle/bin/
          cp -r "$GTK_DIR/share/glib-2.0/schemas/". bundle/share/glib-2.0/schemas/
          cp data/resources/com.openworship.app.gschema.xml bundle/share/glib-2.0/schemas/
          glib-compile-schemas bundle/share/glib-2.0/schemas/
          cp -r "$GTK_DIR/share/icons/."            bundle/share/icons/
          cp -r "$GTK_DIR/lib/gdk-pixbuf-2.0/."     bundle/lib/gdk-pixbuf-2.0/

          GTK_BIN="C:/gtk-build/gtk/x64/release/bin"
          OUTPUT_DIR="bundle/bin"

          mkdir -p "$OUTPUT_DIR"

          # Only copy DLLs from the gtk-build path
          ldd target/production/openworship.exe \
            | grep -iv "windows" \
            | awk '{print $3}' \
            | while read -r dll; do
                filename=$(basename "$dll")
                echo "Copying: $filename"
                cp "$dll" "$OUTPUT_DIR/"
              done

          echo "Creating installer output dir"
          mkdir build

          echo "Done."

      - name: Set App version
        run: echo "APP_VERSION=$(cargo pkgid | cut -d "@" -f2)" >> $GITHUB_ENV

      - name: Download VC++ Redist
        run: |
          mkdir -p redist
          curl -L https://aka.ms/vs/17/release/vc_redist.x64.exe \
            -o redist/vc_redist.x64.exe

      - name: Get VC Redist version
        shell: pwsh
        run: |
          $ver = (Get-Item redist\vc_redist.x64.exe).VersionInfo.ProductVersion
          echo "VC_VERSION=v$ver" >> $env:GITHUB_ENV

      - name: Compile .ISS to .EXE Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: inno.iss
          options: /O+ /DMyAppVersion=${{ env.APP_VERSION }} /DRedistVersion=${{ env.VC_VERSION }}

      - name: Upload installer to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openworship-setup
          path: build/openworship-setup.exe
          if-no-files-found: error

      # - name: Upload installer to assets
      #   uses: alexellis/upload-assets@13926a61cdb2cb35f5fdef1c06b8b591523236d3 # 0.4.1
      #   env:
      #     GITHUB_TOKEN: ${{ github.token }}
      #   with:
      #     asset_paths: '["target/wix/*.exe"]'
      #   if: github.event_name == 'push' && github.ref_type == 'tag'
